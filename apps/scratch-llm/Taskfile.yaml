version: '3'

tasks:
  install:
    desc: Install dependencies and the project in editable mode
    cmds:
      - python3 -m venv venv
      - venv/bin/pip install torch --index-url https://download.pytorch.org/whl/cpu
      - venv/bin/pip install -e .

  train:
    desc: Train the LLM model
    cmds:
      - venv/bin/python scripts/train.py

  infer:
    desc: Run a quick inference test
    cmds:
      - venv/bin/python scripts/inference.py
