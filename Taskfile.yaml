# Root Taskfile for orchestrating tasks across all subprojects.
#
# Usage:
#   - List all available tasks:
#       task
#       (or task --list / task -l)
#
#   - Run a task using namespace paths:
#       task <track>:<subproject>:<task_name> [-- <args>]
#       Examples:
#         task foundations:basics:test
#         task foundations:python:run -- src/dunder_methods.py
#         task foundations:scratch:train -- --device cpu
#
#   - Run root orchestration tasks:
#       task test-all
#       task venv
#
version: '3'

includes:
  foundations:
    taskfile: ./0-foundations/Taskfile.yaml
    dir: ./0-foundations
  practitioner:
    taskfile: ./1-ai-practitioner/Taskfile.yaml
    dir: ./1-ai-practitioner
  systems:
    taskfile: ./2-dl-systems/Taskfile.yaml
    dir: ./2-dl-systems
  research:
    taskfile: ./3-ai-researcher/Taskfile.yaml
    dir: ./3-ai-researcher

tasks:
  default:
    desc: "List all available tasks across tracks"
    silent: true
    cmds:
      - task --list

  venv:
    desc: "Create virtual environment at the root"
    cmds:
      - python3 -m venv venv
    status:
      - test -d venv

  test-all:
    desc: "Run tests for all tracked projects"
    deps:
      - foundations:test-all
