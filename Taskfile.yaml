# Root Taskfile for orchestrating tasks across all subprojects.
#
# Usage:
#   - List all available tasks:
#       task
#       (or task --list / task -l)
#
#   - Run a task from a specific subproject:
#       task <subproject>:<task_name> [-- <args>]
#       Examples:
#         task basics:test
#         task python-concepts:run -- src/dunder_methods.py
#         task scratch-llm:train -- --device cpu
#         task python-concepts:run -- src/oop_meta.py
#
#   - Run root orchestration tasks:
#       task test-all
#       task venv
#
version: '3'

includes:
  basics:
    taskfile: ./0-foundations/20-basics
    dir: ./0-foundations/20-basics
  python-concepts:
    taskfile: ./0-foundations/10-python-concepts
    dir: ./0-foundations/10-python-concepts
  scratch-llm:
    taskfile: ./0-foundations/60-scratch-llm
    dir: ./0-foundations/60-scratch-llm
  scratch-llm-minimal:
    taskfile: ./0-foundations/50-scratch-llm-minimal
    dir: ./0-foundations/50-scratch-llm-minimal
  transformer:
    taskfile: ./0-foundations/40-transformer
    dir: ./0-foundations/40-transformer
  pytorch-patterns:
    taskfile: ./0-foundations/30-pytorch-patterns
    dir: ./0-foundations/30-pytorch-patterns

tasks:
  default:
    desc: "List all available tasks across projects"
    silent: true
    cmds:
      - task --list

  venv:
    desc: "Create virtual environment at the root"
    cmds:
      - python3 -m venv venv
    status:
      - test -d venv

  test-all:
    desc: "Run tests for all projects (basics, python-concepts, pytorch-patterns)"
    deps:
      - basics:test
      - python-concepts:test
      - pytorch-patterns:test
